<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImGui 调色板 · 编辑 ImVec4 表达式</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        body {
            background: #1e1e2f;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.03);
        }
        h1 {
            color: #e3e6f0;
            font-weight: 400;
            font-size: 1.7rem;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #9aa4bf;
            margin-bottom: 28px;
            font-size: 0.95rem;
            border-left: 3px solid #3e4a7a;
            padding-left: 16px;
        }
        .sub code {
            background: #2a2a3c;
            padding: 3px 8px;
            border-radius: 24px;
            color: #b7c9ff;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-item label {
            color: #bdc3d6;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 4px;
        }
        .input-item input {
            background: #0f0f1a;
            border: 1px solid #353b50;
            border-radius: 20px;
            padding: 12px 12px;
            color: white;
            font-size: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            outline: none;
            transition: 0.15s;
            text-align: center;
        }
        .input-item input:focus {
            border-color: #8a9cf0;
            box-shadow: 0 0 0 2px rgba(138, 156, 240, 0.3);
            background: #1a1a2e;
        }
        .input-item input[type=number]::-webkit-inner-spin-button,
        .input-item input[type=number]::-webkit-outer-spin-button {
            opacity: 0.5;
        }

        /* 可编辑 ImVec4 输入框样式 */
        .imvec4-edit {
            width: 100%;
            background: #1a1d2b;
            border: 2px solid #3f4a70;
            border-radius: 60px;
            padding: 14px 22px;
            color: #d3e0ff;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            margin: 16px 0 20px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .imvec4-edit:focus {
            border-color: #a6b7ff;
            background: #10131f;
            box-shadow: 0 0 0 3px rgba(166, 183, 255, 0.2);
        }
        .imvec4-edit::placeholder {
            color: #5a6382;
            font-style: italic;
        }

        .color-preview {
            width: 100%;
            height: 180px;
            border-radius: 32px;
            margin: 10px 0 24px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            transition: background-color 0.1s ease;
            background-color: #b1e3fa;
        }
        .info-panel {
            background: #151525;
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            row-gap: 16px;
            border: 1px solid #2c3147;
        }
        .rgba-255 {
            color: #d9e0ff;
            font-family: 'JetBrains Mono', monospace;
            background: #0b0b14;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            border: 1px solid #323b55;
            word-break: break-word;
        }
        .hex-box {
            background: #21273f;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            letter-spacing: 0.5px;
            border: 1px solid #4f5a82;
        }
        .hint-note {
            margin-top: 18px;
            color: #8e9ac0;
            font-size: 0.9rem;
            background: #1c1f30;
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-block;
            border: 1px dashed #4c5780;
        }
        .footer-note {
            margin-top: 22px;
            color: #6b7299;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #262d44;
            padding-top: 16px;
        }
        .footer-note a {
            color: #aab7f0;
            text-decoration: none;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎨 ImGui 调色板 · 直接编辑 ImVec4</h1>
        <div class="sub">
            <code>ImVec4(0.694, 0.890, 0.980, 1.000)</code> —— 下方输入框可整体编辑
        </div>

        <!-- 四个分量输入框 (RGBA 浮点) -->
        <div class="input-grid">
            <div class="input-item">
                <label for="r">R (红)</label>
                <input type="number" id="r" value="0.694" step="0.001" min="0" max="1" placeholder="0.694">
            </div>
            <div class="input-item">
                <label for="g">G (绿)</label>
                <input type="number" id="g" value="0.890" step="0.001" min="0" max="1" placeholder="0.890">
            </div>
            <div class="input-item">
                <label for="b">B (蓝)</label>
                <input type="number" id="b" value="0.980" step="0.001" min="0" max="1" placeholder="0.980">
            </div>
            <div class="input-item">
                <label for="a">A (透明)</label>
                <input type="number" id="a" value="1.000" step="0.001" min="0" max="1" placeholder="1.000">
            </div>
        </div>

        <!-- ★ 新增可编辑 ImVec4 输入框 (直接编辑整个表达式) -->
        <input type="text" id="imvec4Input" class="imvec4-edit" value="ImVec4(0.694, 0.890, 0.980, 1.000)" placeholder="ImVec4(r, g, b, a) 或 r,g,b,a">

        <!-- 色块预览 -->
        <div class="color-preview" id="colorBlock"></div>

        <!-- 信息面板: 255色值 + HEX -->
        <div class="info-panel">
            <div class="rgba-255" id="rgb255Display">177, 227, 250, 255</div>
            <div class="hex-box" id="hexDisplay">#B1E3FAFF</div>
        </div>

        <!-- 提示: 仍显示当前格式化的 ImVec4 (与编辑框同步，仅作参考) -->
        <div class="hint-note" id="imvec4Hint">
            ImVec4(0.694, 0.890, 0.980, 1.000)
        </div>

        <div class="footer-note">
            ⚡ 在编辑框内直接修改 ImVec4 或四个数字 · 双向实时同步
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const rInput = document.getElementById('r');
            const gInput = document.getElementById('g');
            const bInput = document.getElementById('b');
            const aInput = document.getElementById('a');
            const colorBlock = document.getElementById('colorBlock');
            const rgb255Display = document.getElementById('rgb255Display');
            const hexDisplay = document.getElementById('hexDisplay');
            const imvec4Hint = document.getElementById('imvec4Hint');    // 只读提示 (可选保留)
            const imvec4Input = document.getElementById('imvec4Input');  // 可编辑输入框

            // 防递归标志
            let updating = false;

            // ---------- 辅助函数 ----------
            function floatTo255(v) {
                return Math.round(v * 255);
            }

            function componentToHex(c) {
                const hex = floatTo255(c).toString(16).toUpperCase().padStart(2, '0');
                return hex;
            }

            // 格式化 ImVec4 字符串 (保留3位小数)
            function formatImVec4(r, g, b, a) {
                return `ImVec4(${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}, ${a.toFixed(3)})`;
            }

            // 解析 ImVec4 字符串, 返回 [r,g,b,a] 数组 (浮点数), 解析失败返回 null
            function parseImVec4(str) {
                // 去除首尾空格
                str = str.trim();
                // 尝试匹配标准 ImVec4(...)  (不区分大小写, 允许空格)
                const imvec4Pattern = /^imvec4\s*\(\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*\)$/i;
                let match = str.match(imvec4Pattern);
                if (match) {
                    return [parseFloat(match[1]), parseFloat(match[2]), parseFloat(match[3]), parseFloat(match[4])];
                }
                // 尝试匹配简单的 "0.694, 0.890, 0.980, 1.000" 四个数字
                const simplePattern = /^\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*,\s*([0-9]*\.?[0-9]+)\s*$/;
                match = str.match(simplePattern);
                if (match) {
                    return [parseFloat(match[1]), parseFloat(match[2]), parseFloat(match[3]), parseFloat(match[4])];
                }
                // 顽固解析: 尝试提取所有数字 (至少4个)
                const numbers = str.match(/[0-9]*\.?[0-9]+/g);
                if (numbers && numbers.length >= 4) {
                    return numbers.slice(0, 4).map(parseFloat);
                }
                return null; // 解析失败
            }

            // ---------- 核心更新函数 (从四个输入框读取) ----------
            function updateColorFromInputs() {
                if (updating) return;
                updating = true;

                // 获取当前输入值并限制范围
                let rVal = parseFloat(rInput.value);
                let gVal = parseFloat(gInput.value);
                let bVal = parseFloat(bInput.value);
                let aVal = parseFloat(aInput.value);

                // 处理 NaN
                if (isNaN(rVal)) rVal = 0;
                if (isNaN(gVal)) gVal = 0;
                if (isNaN(bVal)) bVal = 0;
                if (isNaN(aVal)) aVal = 1;

                // 限制 [0,1]
                rVal = Math.min(1, Math.max(0, rVal));
                gVal = Math.min(1, Math.max(0, gVal));
                bVal = Math.min(1, Math.max(0, bVal));
                aVal = Math.min(1, Math.max(0, aVal));

                // 回写 (以防超出范围)
                rInput.value = rVal;
                gInput.value = gVal;
                bInput.value = bVal;
                aInput.value = aVal;

                // 计算 255 分量
                const r255 = floatTo255(rVal);
                const g255 = floatTo255(gVal);
                const b255 = floatTo255(bVal);
                const a255 = floatTo255(aVal);

                // 更新色块
                colorBlock.style.backgroundColor = `rgba(${r255}, ${g255}, ${b255}, ${aVal})`;

                // 更新 255 显示
                rgb255Display.textContent = `${r255}, ${g255}, ${b255}, ${a255}`;

                // 更新 HEX
                const hex = '#' + componentToHex(rVal) + componentToHex(gVal) + componentToHex(bVal) + componentToHex(aVal);
                hexDisplay.textContent = hex;

                // 生成 ImVec4 字符串 (三位小数)
                const imvec4Str = formatImVec4(rVal, gVal, bVal, aVal);

                // 更新可编辑输入框 (只当值不同时更新，避免光标跳动)
                if (imvec4Input.value !== imvec4Str) {
                    imvec4Input.value = imvec4Str;
                }

                // 更新下方的只读提示 (可选)
                imvec4Hint.textContent = imvec4Str;

                updating = false;
            }

            // ---------- 从 ImVec4 输入框解析并更新分量 ----------
            function updateFromImVec4Input() {
                if (updating) return;
                const raw = imvec4Input.value;
                const nums = parseImVec4(raw);
                if (nums) {
                    // 限制范围并更新四个输入框
                    let [r, g, b, a] = nums;
                    r = Math.min(1, Math.max(0, r));
                    g = Math.min(1, Math.max(0, g));
                    b = Math.min(1, Math.max(0, b));
                    a = Math.min(1, Math.max(0, a));

                    // 直接设置值 (不会自动触发 input 事件，所以手动调用更新)
                    rInput.value = r;
                    gInput.value = g;
                    bInput.value = b;
                    aInput.value = a;

                    // 调用统一更新函数 (内部会更新 imvec4Input 的值，可能覆盖当前输入框，但已经是格式化后的)
                    updateColorFromInputs();
                } else {
                    // 解析失败: 可以恢复原来的值 (通过重新调用 updateColorFromInputs 来重置)
                    // 但为了不丢失用户输入，可以暂时不做任何事，或者提示。这里简单地恢复为当前颜色值。
                    // 简单恢复: 用当前分量值重新格式化并更新输入框
                    updateColorFromInputs();  // 这会重新格式化并填入正确的 imvec4Str
                }
            }

            // ---------- 事件绑定 ----------

            // 四个浮点输入框: 输入时实时更新
            [rInput, gInput, bInput, aInput].forEach(input => {
                input.addEventListener('input', updateColorFromInputs);
                input.addEventListener('blur', function() {
                    // 失去焦点时再次确保值合法 (例如空字符串)
                    updateColorFromInputs();
                });
            });

            // ImVec4 可编辑输入框: 失去焦点时解析并更新 (也可以监听 'change' 但 'blur' 更即时)
            imvec4Input.addEventListener('blur', function() {
                updateFromImVec4Input();
            });
            // 按回车键同样触发 (可选)
            imvec4Input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();  // 防止某些浏览器刷新
                    imvec4Input.blur();   // 触发 blur 进行解析
                }
            });

            // 初始化 (确保所有显示一致)
            updateColorFromInputs();

        })();
    </script>
</body>
</html>
